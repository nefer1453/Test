<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>İNSERT ANALİZ - PREMIUM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; margin: 0; color: #1e293b; }
        .tab-btn { flex: 1; padding: 20px; font-weight: 800; text-transform: uppercase; font-size: 0.7rem; background: #f1f5f9; color: #64748b; border: none; }
        .active-tab { background: #ffffff !important; color: #10b981 !important; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border-radius: 12px; }
        .input-elite { background: #ffffff; border: 2px solid #e2e8f0; border-radius: 18px; padding: 16px; width: 100%; font-weight: 700; outline: none; text-align: center; }
        .input-elite:focus { border-color: #10b981; box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1); }
        .btn-action { transition: all 0.2s; cursor: pointer; }
        .btn-action:active { scale: 0.95; }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen pb-32">
    <header class="p-8 text-center">
        <h1 class="text-2xl font-black italic tracking-tighter uppercase">SOĞANLIK 2</h1>
        <p class="text-[10px] text-emerald-600 font-bold tracking-[5px] uppercase">Store Analytics</p>
    </header>

    <nav class="flex mx-4 p-1 rounded-2xl bg-slate-200/50 shadow-inner -mt-6 relative z-10">
        <button onclick="router('kayit')" id="nav-kayit" class="tab-btn active-tab">📝 KAYIT</button>
        <button onclick="router('analiz')" id="nav-analiz" class="tab-btn">📈 ANALİZ</button>
        <button onclick="router('havuz')" id="nav-havuz" class="tab-btn">📋 HAVUZ</button>
    </nav>

    <div id="sc-container" class="px-6 mt-8 hidden">
        <div id="reader" class="rounded-3xl overflow-hidden border-4 border-emerald-500 shadow-2xl bg-black"></div>
        <button onclick="stopCamera()" class="w-full mt-4 bg-red-500 text-white p-4 rounded-2xl font-bold uppercase text-xs">Kapat</button>
    </div>

    <main id="app-view" class="p-6"></main>

    <script>
        const DB = new Dexie("StoreAnalyticsDB");
        DB.version(1).stores({ products: "barkod, n, p", analysis: "++id" });
        
        let scanner = null, pB64 = "", tB64 = "", selectedProduct = null;

        // --- RESİM İŞLEME ---
        function handleImg(input, type) {
            const r = new FileReader();
            r.readAsDataURL(input.files[0]);
            r.onload = e => { 
                if(type==='p') { pB64 = e.target.result; document.getElementById('p-status').innerText = "✅ Ürün OK"; }
                else { tB64 = e.target.result; document.getElementById('t-status').innerText = "✅ Teşhir OK"; }
            };
        }

        // --- HAVUZ YÖNETİMİ (SİL / DÜZENLE) ---
        async function deleteProduct(barkod) {
            if(confirm('Bu ürünü havuzdan silmek istediğine emin misin?')) {
                await DB.products.delete(barkod);
                router('havuz');
            }
        }

        async function editProduct(barkod) {
            const p = await DB.products.get(barkod);
            if(p) {
                router('kayit');
                setTimeout(() => {
                    document.getElementById('regB').value = p.barkod;
                    document.getElementById('regN').value = p.n;
                    document.getElementById('regP').value = p.p;
                    pB64 = p.img || "";
                    tB64 = p.timg || "";
                }, 100);
            }
        }

        // --- ANALİZ ÜRÜN SEÇME ---
        async function selectProduct(barkod) {
            const p = await DB.products.get(barkod);
            if(p) {
                selectedProduct = p;
                document.getElementById('sel-box').innerHTML = `
                    <div class="bg-emerald-50 p-4 rounded-2xl border border-emerald-100 flex items-center gap-4">
                        <img src="${p.img || ''}" class="w-12 h-12 rounded-lg object-cover bg-white">
                        <div class="text-left">
                            <p class="font-black text-xs text-emerald-900 uppercase">${p.n}</p>
                            <p class="text-[10px] text-emerald-600 font-bold">${p.barkod} | ${p.p} TL</p>
                        </div>
                    </div>`;
                document.getElementById('search-res').classList.add('hidden');
                document.getElementById('searchIn').value = p.n;
            }
        }

        async function searchPool(v) {
            const res = document.getElementById('search-res');
            if(v.length < 2) return res.classList.add('hidden');
            const matches = await DB.products.filter(p => p.n.toLowerCase().includes(v.toLowerCase()) || p.barkod.includes(v)).toArray();
            res.innerHTML = matches.map(p => `<div onclick="selectProduct('${p.barkod}')" class="p-4 border-b font-bold text-xs uppercase cursor-pointer hover:bg-gray-50">${p.n}</div>`).join('');
            res.classList.remove('hidden');
        }

        const router = async (page) => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab'));
            const b = document.getElementById('nav-' + page); if(b) b.classList.add('active-tab');
            const view = document.getElementById('app-view');

            if(page === 'kayit') {
                view.innerHTML = `<div class="bg-white p-6 space-y-4 rounded-[35px] shadow-xl border">
                    <div class="flex gap-2">
                        <input id="regB" placeholder="BARKOD" class="input-elite flex-1 uppercase">
                        <button onclick="startCamera()" class="bg-orange-500 text-white px-5 rounded-2xl">📷</button>
                    </div>
                    <input id="regN" placeholder="ÜRÜN ADI" class="input-elite uppercase">
                    <input id="regP" placeholder="FİYAT" class="input-elite">
                    <div class="grid grid-cols-2 gap-3">
                        <div onclick="document.getElementById('f1').click()" class="bg-slate-50 border-2 border-dashed rounded-2xl p-4 text-center cursor-pointer">
                            <span id="p-status" class="text-[9px] font-black text-slate-400 uppercase">Ürün Foto</span>
                            <input type="file" id="f1" class="hidden" onchange="handleImg(this,'p')">
                        </div>
                        <div onclick="document.getElementById('f2').click()" class="bg-orange-50 border-2 border-dashed border-orange-200 rounded-2xl p-4 text-center cursor-pointer">
                            <span id="t-status" class="text-[9px] font-black text-orange-400 uppercase">Teşhir Foto</span>
                            <input type="file" id="f2" class="hidden" onchange="handleImg(this,'t')">
                        </div>
                    </div>
                    <button onclick="saveToPool()" class="w-full bg-slate-900 text-white p-5 rounded-3xl font-black uppercase">Havuza Kaydet</button>
                </div>`;
            } else if(page === 'analiz') {
                view.innerHTML = `<div class="bg-white p-6 space-y-4 rounded-[35px] shadow-xl border">
                    <input id="searchIn" onkeyup="searchPool(this.value)" placeholder="HAVUZDAN ÜRÜN ÇEK..." class="input-elite uppercase">
                    <div id="search-res" class="hidden bg-white border rounded-2xl max-h-40 overflow-auto z-50"></div>
                    <div id="sel-box"></div>
                    <div class="grid grid-cols-2 gap-3"><input id="ns" placeholder="NORM. SATIŞ" class="input-elite"><input id="is" placeholder="İNS. SATIŞ" class="input-elite text-orange-600"></div>
                    
                    <p class="text-[10px] font-black text-slate-400 uppercase ml-2">Yapılan İşlem</p>
                    <select id="opType" class="input-elite text-sm appearance-none">
                        <option>Gondol Başı</option>
                        <option>Sepet Teşhir</option>
                        <option>Havuz Dolabı</option>
                        <option>Kasa Önü</option>
                        <option>Reyon Blok/Ön Yüz</option>
                    </select>

                    <textarea id="note" placeholder="Saha Analizi..." class="input-elite h-24 text-left p-4 text-xs font-medium"></textarea>
                    <button onclick="alert('PDF Sırasına Eklendi!')" class="w-full bg-emerald-600 text-white p-5 rounded-3xl font-black uppercase shadow-lg">Analizi Sıraya Ekle</button>
                </div>`;
            } else if(page === 'havuz') {
                const ps = await DB.products.toArray();
                view.innerHTML = `<div class="space-y-3">
                    ${ps.map(p => `
                        <div class="bg-white p-4 rounded-3xl border flex items-center justify-between shadow-sm">
                            <div class="flex items-center gap-3">
                                <img src="${p.img || ''}" class="w-10 h-10 rounded-lg object-cover bg-gray-50">
                                <div class="text-left">
                                    <p class="font-black uppercase text-[10px] leading-tight">${p.n}</p>
                                    <p class="text-[9px] text-gray-400 font-bold">${p.barkod} | ${p.p} TL</p>
                                </div>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="editProduct('${p.barkod}')" class="bg-blue-50 text-blue-600 p-2 rounded-xl text-[10px] font-black uppercase">DÜZENLE</button>
                                <button onclick="deleteProduct('${p.barkod}')" class="bg-red-50 text-red-600 p-2 rounded-xl text-[10px] font-black uppercase">SİL</button>
                            </div>
                        </div>
                    `).join('')}
                    <button onclick="recoverOldData()" class="w-full mt-6 bg-slate-100 text-slate-500 p-4 rounded-3xl font-black text-[10px] uppercase shadow-sm">🔄 Eski Verileri Getir</button>
                </div>`;
            }
        };

        function startCamera() {
            document.getElementById('sc-container').classList.remove('hidden');
            scanner = new Html5Qrcode("reader");
            scanner.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (text) => {
                const bInput = document.getElementById('regB') || document.getElementById('searchIn');
                if(bInput) bInput.value = text;
                if(document.getElementById('searchIn')) searchPool(text);
                stopCamera();
            }).catch(() => alert("Kamera hatası!"));
        }
        function stopCamera() { if(scanner) scanner.stop().then(() => document.getElementById('sc-container').classList.add('hidden')); }
        async function saveToPool() {
            const b = document.getElementById('regB').value, n = document.getElementById('regN').value, p = document.getElementById('regP').value;
            if(!b || !n) return alert("Eksik veri!");
            await DB.products.put({ barkod: b, n: n.toUpperCase(), p, img: pB64, timg: tB64 });
            alert("Havuz Güncellendi!"); 
            pB64 = ""; tB64 = ""; // Reset photos
            router('havuz');
        }

        router('kayit');
    </script>
</body>
</html>
