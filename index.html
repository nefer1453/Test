<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>İNSERT ANALİZ - PREMIUM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; margin: 0; color: #1e293b; overflow-x: hidden; }
        .tab-btn { flex: 1; padding: 18px; font-weight: 800; text-transform: uppercase; font-size: 0.7rem; background: #f1f5f9; color: #64748b; border: none; }
        .active-tab { background: #ffffff !important; color: #10b981 !important; box-shadow: 0 10px 20px rgba(0,0,0,0.05); border-radius: 12px; }
        .input-elite { background: #ffffff; border: 2px solid #e2e8f0; border-radius: 16px; padding: 16px; width: 100%; font-weight: 700; outline: none; text-align: center; }
        #report-bar { position: fixed; bottom: 20px; left: 20px; right: 20px; background: #0f172a; padding: 20px; border-radius: 24px; display: none; justify-content: space-between; align-items: center; color: white; z-index: 1000; box-shadow: 0 20px 50px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen pb-40">
    <header class="p-8 text-center"><h1 class="text-2xl font-black italic uppercase">SOĞANLIK 2</h1></header>

    <nav class="flex mx-4 p-1 rounded-2xl bg-slate-200/50 shadow-inner -mt-6 relative z-10">
        <button onclick="router('kayit')" id="nav-kayit" class="tab-btn active-tab">📝 KAYIT</button>
        <button onclick="router('analiz')" id="nav-analiz" class="tab-btn">📈 ANALİZ</button>
        <button onclick="router('havuz')" id="nav-havuz" class="tab-btn">📋 HAVUZ</button>
    </nav>

    <main id="app-view" class="p-6"></main>

    <div id="report-bar">
        <div class="flex flex-col">
            <span id="q-count" class="font-black text-emerald-400 text-sm">0 ÜRÜN</span>
            <span class="text-[8px] uppercase opacity-60">Rapor Sırası Bekliyor</span>
        </div>
        <button onclick="generatePDF()" class="bg-emerald-500 text-white px-6 py-3 rounded-xl font-black text-[10px] uppercase shadow-lg">PDF OLUŞTUR</button>
    </div>

    <div id="pdf-tpl" class="hidden" style="position: absolute; left: -9999px;"></div>

    <script>
        const DB = new Dexie("StoreAnalyticsDB");
        DB.version(1).stores({ products: "barkod, n, p", analysis: "++id" });
        let pB64 = "", tB64 = "", selectedProduct = null, queue = [];

        async function generatePDF() {
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'mm', 'a4');
            for(let i=0; i < queue.length; i++) {
                const item = queue[i];
                const page1 = document.getElementById('pdf-tpl');
                page1.classList.remove('hidden');
                page1.innerHTML = `<div style="width:794px; height:1123px; background:white; padding:40px;"><div style="background:#0f5c3f; color:white; padding:30px; border-radius:20px; font-size:30px; font-weight:bold; display:flex; justify-content:space-between;"><span>${item.p.n}</span><span style="color:#e8b87a">${item.op}</span></div><img src="${item.p.timg || item.p.img}" style="width:100%; height:900px; object-fit:cover; border-radius:30px; margin-top:30px; box-shadow: 0 20px 40px rgba(0,0,0,0.2);"></div>`;
                const c1 = await html2canvas(page1);
                if(i > 0) pdf.addPage();
                pdf.addImage(c1.toDataURL('image/jpeg', 0.8), 'JPEG', 0, 0, 210, 297);
                page1.innerHTML = `<div style="width:794px; height:1123px; background:#fef9f0; padding:80px;"><h1 style="color:#0f5c3f; font-size:50px; font-weight:900;">${item.p.n}</h1><div style="display:flex; gap:40px; margin-top:60px;"><div style="background:white; padding:40px; border-radius:30px; flex:1; text-align:center; box-shadow:0 10px 30px rgba(0,0,0,0.05); border-bottom:10px solid #e2e8f0;"><p style="color:#64748b; font-weight:bold;">NORMAL SATIŞ</p><h2 style="font-size:60px;">${item.ns} AD</h2></div><div style="background:white; padding:40px; border-radius:30px; flex:1; text-align:center; box-shadow:0 10px 30px rgba(0,0,0,0.05); border-bottom:10px solid #e8b87a;"><p style="color:#e8b87a; font-weight:bold;">İNSERT SATIŞ</p><h2 style="font-size:60px; color:#0f5c3f;">${item.is} AD</h2></div></div><div style="background:white; padding:60px; border-radius:40px; margin-top:60px; min-height:400px; border:1px solid #eee;"><h3 style="color:#0f5c3f; font-size:24px; margin-bottom:20px;">SAHA GÖZLEMLERİ</h3><p style="font-size:24px; line-height:1.6; color:#334155;">${item.note}</p></div></div>`;
                const c2 = await html2canvas(page1);
                pdf.addPage();
                pdf.addImage(c2.toDataURL('image/jpeg', 0.8), 'JPEG', 0, 0, 210, 297);
                page1.classList.add('hidden');
            }
            pdf.save("Soganlik2_Analiz.pdf");
        }

        const router = async (page) => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab'));
            document.getElementById('nav-' + page).classList.add('active-tab');
            const view = document.getElementById('app-view');
            if(page === 'kayit') {
                view.innerHTML = `<div class="bg-white p-6 space-y-4 rounded-[35px] shadow-xl border"><input id="regB" placeholder="BARKOD" class="input-elite uppercase"><input id="regN" placeholder="ÜRÜN ADI" class="input-elite uppercase"><input id="regP" placeholder="FİYAT" class="input-elite"><div class="grid grid-cols-2 gap-3"><div onclick="document.getElementById('f1').click()" class="bg-slate-50 border-2 border-dashed rounded-2xl p-4 text-center cursor-pointer"><span id="ps" class="text-[9px] font-black uppercase text-slate-400">Ürün Foto</span><input type="file" id="f1" class="hidden" onchange="readImg(this,'p')"></div><div onclick="document.getElementById('f2').click()" class="bg-orange-50 border-2 border-dashed border-orange-100 rounded-2xl p-4 text-center cursor-pointer"><span id="ts" class="text-[9px] font-black uppercase text-orange-400">Teşhir Foto</span><input type="file" id="f2" class="hidden" onchange="readImg(this,'t')"></div></div><button onclick="save()" class="w-full bg-slate-900 text-white p-5 rounded-3xl font-black uppercase shadow-lg active:scale-95 transition">Havuza Kaydet</button></div>`;
            } else if(page === 'analiz') {
                view.innerHTML = `<div class="bg-white p-6 space-y-4 rounded-[35px] shadow-xl border"><input id="searchIn" onkeyup="searchPool(this.value)" placeholder="HAVUZDAN ÇEK..." class="input-elite uppercase"><div id="search-res" class="hidden bg-white border rounded-2xl max-h-40 overflow-auto z-50"></div><div id="sel-box"></div><div class="grid grid-cols-2 gap-4"><input id="ns" placeholder="NORM. SATIŞ" class="input-elite"><input id="is" placeholder="İNS. SATIŞ" class="input-elite text-orange-600"></div><select id="opType" class="input-elite text-sm"><option>Gondol Başı</option><option>Sepet Teşhir</option><option>Havuz Dolabı</option><option>Kasa Önü</option><option>Reyon Blok</option></select><textarea id="note" placeholder="Saha Analiz Notu..." class="input-elite h-24 text-left p-4 text-xs font-medium"></textarea><button onclick="addToQueue()" class="w-full bg-emerald-600 text-white p-5 rounded-3xl font-black uppercase shadow-lg active:scale-95 transition">Sıraya Ekle +</button></div>`;
            } else if(page === 'havuz') {
                const ps = await DB.products.toArray();
                view.innerHTML = `<div class="space-y-3">${ps.map(p => `<div class="bg-white p-4 rounded-3xl border flex items-center justify-between shadow-sm"><div class="flex items-center gap-3"><img src="${p.img}" class="w-10 h-10 rounded-lg object-cover bg-gray-50"><p class="font-black uppercase text-[10px]">${p.n}</p></div><button onclick="deleteP('${p.barkod}')" class="text-red-500 font-black text-[10px] p-2">SİL</button></div>`).join('') || "Havuz Boş"}</div>`;
            }
        };

        function readImg(i, t) { const r = new FileReader(); r.readAsDataURL(i.files[0]); r.onload = e => { if(t==='p'){ pB64=e.target.result; document.getElementById('ps').innerText="✅ ÜRÜN TAMAM"; } else { tB64=e.target.result; document.getElementById('ts').innerText="✅ TEŞHİR TAMAM"; } }; }
        async function save() { await DB.products.put({ barkod: document.getElementById('regB').value, n: document.getElementById('regN').value.toUpperCase(), p: document.getElementById('regP').value, img: pB64, timg: tB64 }); alert("Kaydedildi!"); router('havuz'); }
        async function deleteP(b) { if(confirm('Silinsin mi?')){ await DB.products.delete(b); router('havuz'); } }
        async function searchPool(v) { const res = document.getElementById('search-res'); if(v.length<2) return res.classList.add('hidden'); const ps = await DB.products.filter(p=>p.n.toLowerCase().includes(v.toLowerCase())).toArray(); res.innerHTML = ps.map(p => `<div onclick="selectP('${p.barkod}')" class="p-4 border-b font-bold text-xs uppercase cursor-pointer">${p.n}</div>`).join(''); res.classList.remove('hidden'); }
        async function selectP(b) { selectedProduct = await DB.products.get(b); document.getElementById('sel-box').innerHTML = `<div class="bg-emerald-50 p-4 rounded-2xl border border-emerald-100 flex items-center gap-3"><img src="${selectedProduct.img}" class="w-10 h-10 rounded-lg object-cover"><p class="font-bold text-xs uppercase text-emerald-900">${selectedProduct.n}</p></div>`; document.getElementById('search-res').classList.add('hidden'); document.getElementById('searchIn').value = selectedProduct.n; }
        function addToQueue() { if(!selectedProduct) return alert("Ürün seç!"); queue.push({ p: selectedProduct, ns: document.getElementById('ns').value, is: document.getElementById('is').value, op: document.getElementById('opType').value, note: document.getElementById('note').value }); document.getElementById('report-bar').style.display = 'flex'; document.getElementById('q-count').innerText = queue.length + " ÜRÜN"; alert("Eklendi!"); }

        router('kayit');
    </script>
</body>
</html>
