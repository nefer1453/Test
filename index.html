<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>İNSERT ANALİZ - PREMIUM v36.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #ffffff; color: #000; margin: 0; }
        .tab-btn { flex: 1; padding: 20px; font-weight: 800; text-transform: uppercase; font-size: 0.7rem; background: #f3f4f6; border: none; }
        .active-tab { background: #ffffff !important; color: #10b981 !important; font-size: 1.1rem !important; box-shadow: 0 10px 25px rgba(0,0,0,0.08); z-index: 20; }
        .input-elite { background: #f9fafb; border: 2px solid #e5e7eb; border-radius: 16px; padding: 14px; width: 100%; color: #000; outline: none; text-align: center; font-weight: 600; transition: all 0.3s; }
        .input-elite:focus { border-color: #10b981; }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen pb-32">
    <header class="p-8 text-center bg-white">
        <h1 class="text-3xl font-black italic tracking-tighter uppercase text-black">İNSERT ANALİZ</h1>
        <p class="text-[10px] text-emerald-600 font-bold tracking-[5px] mt-1 uppercase">Soğanlık 2 Premium</p>
    </header>

    <nav class="flex mx-4 -mt-5 rounded-2xl overflow-hidden shadow-xl border border-gray-100 bg-gray-100 relative z-10">
        <button onclick="router('kayit')" id="nav-kayit" class="tab-btn active-tab">📝 KAYIT</button>
        <button onclick="router('analiz')" id="nav-analiz" class="tab-btn">📈 ANALİZ</button>
        <button onclick="router('havuz')" id="nav-havuz" class="tab-btn">📋 HAVUZ</button>
    </nav>

    <div id="sc-container" class="px-6 mt-8 hidden">
        <div id="reader" class="rounded-2xl overflow-hidden border-4 border-orange-500 shadow-2xl"></div>
        <button onclick="stopCamera()" class="w-full mt-2 bg-red-500 text-white p-2 rounded-xl font-bold text-xs uppercase">Kapat</button>
    </div>

    <main id="app-view" class="p-6"></main>

    <div id="cart-bar" class="fixed bottom-6 left-6 right-6 bg-slate-900 p-4 rounded-3xl shadow-2xl flex justify-between items-center text-white hidden z-40">
        <span id="cart-count" class="font-black italic ml-2 text-xs uppercase">0 Ürün</span>
        <button onclick="alert('PDF Hazırlanıyor...')" class="bg-emerald-500 px-6 py-3 rounded-2xl font-black uppercase text-[10px]">PDF BAS 📄</button>
    </div>

    <script>
        const DBModule = new Dexie("SKT_KONTROL_MASTER_POOL");
        DBModule.version(1).stores({ products: "barkod, n, p" });
        let html5QrCode = null;
        const DataModule = { pB64: "", tB64: "" };

        async function recoverOldData() {
            let oldPool = JSON.parse(localStorage.getItem('pool')) || [];
            if(oldPool.length === 0) return alert("Eski veriler bulunamadı!");
            for(let item of oldPool) {
                await DBModule.products.put({ 
                    barkod: item.barcode, 
                    n: item.name.toUpperCase(), 
                    p: item.price, 
                    img: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23ccc'/%3E%3C/svg%3E", 
                    pre: "" 
                });
            }
            alert("Veriler yeni sisteme aktarıldı!"); router('havuz');
        }

        async function startCamera() {
            document.getElementById('sc-container').classList.remove('hidden');
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
                if(document.getElementById('regB')) document.getElementById('regB').value = text;
                stopCamera();
            }).catch(err => alert("Kamera hatası: " + err));
        }

        function stopCamera() {
            if(html5QrCode) html5QrCode.stop().then(() => {
                document.getElementById('sc-container').classList.add('hidden');
            });
        }

        const router = async (page) => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab'));
            document.getElementById('nav-' + page).classList.add('active-tab');
            const view = document.getElementById('app-view');
            if(page === 'kayit') {
                view.innerHTML = `<div class="bg-white p-6 space-y-4 rounded-[30px] shadow-lg border">
                    <div class="flex gap-2">
                        <input id="regB" placeholder="BARKOD" class="input-elite flex-1">
                        <button onclick="startCamera()" class="bg-orange-500 text-white px-4 rounded-2xl font-bold italic text-xs uppercase">KAMERA 📷</button>
                    </div>
                    <input id="regN" placeholder="ÜRÜN ADI" class="input-elite uppercase">
                    <input id="regP" placeholder="FİYAT" class="input-elite">
                    <button onclick="alert('Kayıt Fonksiyonu Çalışıyor')" class="w-full bg-slate-900 text-white p-5 rounded-3xl font-black uppercase">HAVUZA EKLE</button>
                </div>`;
            } else if(page === 'havuz') {
                const ps = await DBModule.products.toArray();
                view.innerHTML = `
                <div class="grid grid-cols-2 gap-4">${ps.map(p => `<div class="bg-white p-4 rounded-3xl border text-center shadow-sm"><p class="text-[10px] font-black uppercase truncate">${p.n}</p></div>`).join('')}</div>
                <button onclick="recoverOldData()" class="w-full mt-8 bg-red-600 text-white p-4 rounded-3xl font-black text-[10px] uppercase opacity-50">⚠️ ESKİ HAVUZU AKTAR</button>`;
            }
        };
        router('kayit');
    </script>
</body>
</html>
