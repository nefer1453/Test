<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>İNSERT ANALİZ - PREMIUM v36.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; margin: 0; }
        .tab-btn { flex: 1; padding: 18px; font-weight: 800; text-transform: uppercase; font-size: 0.7rem; background: #f3f4f6; border: none; transition: all 0.3s; color: #64748b; }
        .active-tab { background: #ffffff !important; color: #10b981 !important; font-size: 0.9rem !important; box-shadow: 0 10px 20px rgba(0,0,0,0.05); z-index: 10; border-radius: 12px; }
        .input-elite { background: #ffffff; border: 2px solid #e2e8f0; border-radius: 16px; padding: 16px; width: 100%; font-weight: 600; outline: none; text-align: center; transition: all 0.3s; }
        .input-elite:focus { border-color: #10b981; box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1); }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen pb-32">
    <header class="p-8 text-center">
        <h1 class="text-2xl font-black italic tracking-tighter uppercase">SOĞANLIK 2 PREMİUM</h1>
    </header>

    <nav class="flex mx-4 p-1 rounded-2xl bg-gray-100 shadow-inner">
        <button onclick="router('kayit')" id="nav-kayit" class="tab-btn active-tab">📝 KAYIT</button>
        <button onclick="router('analiz')" id="nav-analiz" class="tab-btn">📈 ANALİZ</button>
        <button onclick="router('havuz')" id="nav-havuz" class="tab-btn">📋 HAVUZ</button>
    </nav>

    <div id="sc-container" class="px-6 mt-8 hidden">
        <div id="reader" class="rounded-3xl overflow-hidden border-4 border-emerald-500 shadow-2xl"></div>
        <button onclick="stopCamera()" class="w-full mt-4 bg-red-500 text-white p-4 rounded-2xl font-bold uppercase text-xs">Kamerayı Kapat</button>
    </div>

    <main id="app-view" class="p-6"></main>

    <script>
        const DB = new Dexie("StoreAnalytics");
        DB.version(1).stores({ products: "barkod, n, p" });
        let scanner = null;
        let pB64 = "", tB64 = "";

        async function startCamera() {
            document.getElementById('sc-container').classList.remove('hidden');
            scanner = new Html5Qrcode("reader");
            scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
                const bInput = document.getElementById('regB') || document.getElementById('searchIn');
                if(bInput) bInput.value = text;
                stopCamera();
            }).catch(err => alert("Kamera izni gerekli!"));
        }

        function stopCamera() {
            if(scanner) scanner.stop().then(() => document.getElementById('sc-container').classList.add('hidden'));
        }

        async function saveToPool() {
            const b = document.getElementById('regB').value, n = document.getElementById('regN').value, p = document.getElementById('regP').value;
            if(!b || !n) return alert("Barkod ve İsim zorunlu!");
            await DB.products.put({ barkod: b, n: n.toUpperCase(), p, img: pB64 });
            alert("Havuza Eklendi! ✅");
            router('havuz');
        }

        const router = async (page) => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab'));
            document.getElementById('nav-' + page).classList.add('active-tab');
            const view = document.getElementById('app-view');

            if(page === 'kayit') {
                view.innerHTML = `<div class="bg-white p-6 space-y-4 rounded-[32px] shadow-xl border border-gray-50">
                    <div class="flex gap-2">
                        <input id="regB" placeholder="BARKOD" class="input-elite flex-1 uppercase">
                        <button onclick="startCamera()" class="bg-orange-500 text-white px-5 rounded-2xl font-bold">📷</button>
                    </div>
                    <input id="regN" placeholder="ÜRÜN ADI" class="input-elite uppercase">
                    <input id="regP" placeholder="FİYAT" class="input-elite">
                    <div class="grid grid-cols-2 gap-3">
                        <div onclick="document.getElementById('f1').click()" class="bg-slate-50 border-2 border-dashed rounded-2xl p-4 text-center cursor-pointer">
                            <span class="text-[9px] font-bold text-slate-400 uppercase">Ürün Foto</span>
                            <input type="file" id="f1" class="hidden" onchange="readImg(this)">
                        </div>
                    </div>
                    <button onclick="saveToPool()" class="w-full bg-slate-900 text-white p-5 rounded-3xl font-black uppercase shadow-lg active:scale-95 transition">HAVUZA EKLE</button>
                </div>`;
            } else if(page === 'havuz') {
                const ps = await DB.products.toArray();
                view.innerHTML = `<div class="grid grid-cols-2 gap-4">
                    ${ps.map(p => `<div class="bg-white p-4 rounded-3xl border text-center shadow-sm">
                        <p class="font-black uppercase text-[10px] truncate">${p.n}</p>
                        <p class="text-emerald-600 font-bold text-xs">${p.p} TL</p>
                    </div>`).join('')}
                </div>`;
            }
        };

        function readImg(input) {
            const reader = new FileReader();
            reader.onload = e => pB64 = e.target.result;
            reader.readAsDataURL(input.files[0]);
        }

        router('kayit');
    </script>
</body>
</html>
